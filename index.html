<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessing Birthday.sys...</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #c9184a;
            --bg: #0b090a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; /* Prevent scroll until site opens */
            height: 100vh;
        }

        /* --- 1. TERMINAL INTRO --- */
        #terminal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            padding: 40px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 10px;
        }

        .line {
            font-size: 14px;
            color: #00ff41;
            opacity: 0;
            transform: translateY(10px);
            animation: printLine 0.1s forwards;
        }

        @keyframes printLine {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 2. 3D FLOATING GIFT --- */
        #gift-scene {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 900;
            background: radial-gradient(circle at center, #2b0b14 0%, #0b090a 100%);
        }

        .gift-container {
            width: 200px;
            height: 200px;
            position: relative;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gift-container:hover { transform: scale(1.1) rotate(5deg); }

        .box {
            width: 100%;
            height: 100%;
            background: var(--primary);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* --- 3. MAIN GALLERY CONTENT --- */
        #main-app {
            display: none;
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 30px;
            max-width: 90%;
            width: 400px;
        }

        .photo-frame {
            width: 100%;
            height: 300px;
            background: #222;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 4px solid white;
            transform: rotate(-3deg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* --- 4. THE FINAL QUESTION --- */
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-yes { background: var(--primary); color: white; }
        .btn-no { background: white; color: black; position: relative; }

        /* --- BACKGROUND DECOR --- */
        .floating-heart {
            position: absolute;
            color: var(--primary);
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
            animation: rise 5s linear infinite;
        }

        @keyframes rise {
            from { transform: translateY(100vh) scale(0); opacity: 1; }
            to { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 1. TERMINAL INTRO -->
    <div id="terminal"></div>

    <!-- 2. THE GIFT BOX -->
    <div id="gift-scene">
        <div class="gift-container" onclick="openApp()">
            <div class="box">🎁</div>
        </div>
        <p style="margin-top: 20px; letter-spacing: 2px; color: var(--primary);">TAP TO UNWRAP</p>
    </div>

    <!-- 3. THE APP CONTENT -->
    <main id="main-app">
        <!-- Slide 1 -->
        <section>
            <div class="glass-card">
                <div class="photo-frame">
                    <img src="https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1000" alt="Memory 1">
                </div>
                <h2>The Start</h2>
                <p>Remember when we first met? I knew right then that 2025 was going to be special.</p>
            </div>
        </section>

        <!-- Slide 2 -->
        <section>
            <div class="glass-card">
                <div class="photo-frame" style="transform: rotate(3deg);">
                    <img src="https://images.unsplash.com/photo-1464349153735-7db50ed83c84?q=80&w=1000" alt="Memory 2">
                </div>
                <h2>The Laughs</h2>
                <p>Nobody makes me laugh quite the way you do. Your smile is literally my favorite thing.</p>
            </div>
        </section>

        <!-- Slide 3: Final Question -->
        <section>
            <h1 style="font-size: 3rem; margin-bottom: 20px;">Ready for your <br><span style="color:var(--primary)">Birthday Treat?</span></h1>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="celebrate()">YES! ❤️</button>
                <button class="btn btn-no" id="noBtn" onmouseover="moveNo()">No</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // --- PERSONALIZATION ---
        const CONFIG = {
            name: "Bestie", // Recipient name
            lines: [
                "> INITIALIZING BIRTHDAY_CORE.EXE...",
                "> SEARCHING FOR SUBJECT: [REDACTED]",
                "> SUBJECT FOUND: " + "NAME_HERE",
                "> LOADING CORE MEMORIES...",
                "> BYPASSING EMOTIONAL FIREWALL...",
                "> ACCESS GRANTED.",
                "> HAPPY BIRTHDAY! OPENING GIFT..."
            ]
        };

        // --- 1. TERMINAL LOGIC ---
        const terminal = document.getElementById('terminal');
        let lineIdx = 0;

        function runTerminal() {
            if (lineIdx < CONFIG.lines.length) {
                const p = document.createElement('p');
                p.className = 'line';
                p.innerText = CONFIG.lines[lineIdx];
                terminal.appendChild(p);
                lineIdx++;
                setTimeout(runTerminal, 600);
            } else {
                setTimeout(() => {
                    terminal.style.transition = '1s';
                    terminal.style.opacity = '0';
                    setTimeout(() => {
                        terminal.style.display = 'none';
                        document.getElementById('gift-scene').style.display = 'flex';
                    }, 1000);
                }, 1500);
            }
        }

        // Start
        window.onload = runTerminal;

        // --- 2. OPENING THE APP ---
        function openApp() {
            document.getElementById('gift-scene').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gift-scene').style.display = 'none';
                const main = document.getElementById('main-app');
                main.style.display = 'block';
                document.body.style.overflow = 'auto';
                createHearts();
            }, 500);
        }

        // --- 3. INTERACTIVE "NO" BUTTON ---
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // --- 4. CELEBRATION ---
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffffff', '#ffb3c1']
            });
            alert("Check your WhatsApp! Your real gift is coming your way! 🎂✨");
        }

        // --- 5. DECORATION ---
        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
